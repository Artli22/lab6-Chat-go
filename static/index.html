<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GoChat</title>
</head>
<body>
    <h1>CHAT!</h1>
	<ul id="messages"></ul>

	<footer>

	</footer>
    <script src="script.js" type="module"> </script>
	<link rel="stylesheet" href="styles.css">
</body>

</html>
